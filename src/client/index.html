<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velan Metrology – Production Dashboard</title>

  <!-- ── External CDN Libraries ─────────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <!-- ── Fonts ──────────────────────────────────────────────────────────── -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- ── App Styles ─────────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="root"></div>

  <!--
    ── App Source Files ────────────────────────────────────────────────────
    Loaded in dependency order. Babel transpiles JSX in-browser (no build step).
  -->
  <!-- 1. Utilities -->
  <script type="text/babel" src="js/utils/dateUtils.js"></script>
  <script type="text/babel" src="js/utils/calculationUtils.js"></script>
  <script type="text/babel" src="js/utils/chartUtils.js"></script>

  <!-- 2. Services -->
  <script type="text/babel" src="js/services/googleSheets.js"></script>
  <script type="text/babel" src="js/services/api.js"></script>
  <script type="text/babel" src="js/services/dataNormalizer.js"></script>
  <script type="text/babel" src="js/services/stageResolver.js"></script>
  <script type="text/babel" src="js/services/excelParser.js"></script>

  <!-- 3. Hooks -->
  <script type="text/babel" src="js/hooks/useFilters.js"></script>
  <script type="text/babel" src="js/hooks/useDashboardData.js"></script>
  <script type="text/babel" src="js/hooks/useLiveSync.js"></script>
  <script type="text/babel" src="js/hooks/useUploadHandlers.js"></script>

  <!-- 4. Context Provider -->
  <script type="text/babel" src="js/context/DashboardContext.js"></script>

  <!-- 5. UI Components -->
  <script type="text/babel" src="js/components/ErrorBoundary.jsx"></script>
  <script type="text/babel" src="js/components/LoadingScreen.jsx"></script>
  <script type="text/babel" src="js/components/Header.jsx"></script>
  <script type="text/babel" src="js/components/Sidebar.jsx"></script>
  <script type="text/babel" src="js/components/FilterBar.jsx"></script>
  <script type="text/babel" src="js/components/KPICard.jsx"></script>
  <script type="text/babel" src="js/components/DataTable.jsx"></script>
  <script type="text/babel" src="js/components/Modal.jsx"></script>
  <script type="text/babel" src="js/components/ChartCard.jsx"></script>

  <!-- 6. Page Layouts -->
  <script type="text/babel" src="js/pages/OverviewPage.jsx"></script>
  <script type="text/babel" src="js/pages/MonthDayPage.jsx"></script>
  <script type="text/babel" src="js/pages/DatabasePage.jsx"></script>
  <script type="text/babel" src="js/pages/ProductionPage.jsx"></script>
  <script type="text/babel" src="js/pages/WIPPage.jsx"></script>
  <script type="text/babel" src="js/pages/CycleTimePage.jsx"></script>
  <script type="text/babel" src="js/pages/BottleneckPage.jsx"></script>
  <script type="text/babel" src="js/pages/POPage.jsx"></script>
  <script type="text/babel" src="js/pages/SCPage.jsx"></script>
  <script type="text/babel" src="js/pages/VendorPage.jsx"></script>
  <script type="text/babel" src="js/pages/UploadPage.jsx"></script>

  <!-- 7. Main Entry -->
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
