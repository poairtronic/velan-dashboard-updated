<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velan Metrology – Production Dashboard</title>

  <!-- ── External CDN Libraries ─────────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <!-- ── Fonts ──────────────────────────────────────────────────────────── -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- ── App Styles ─────────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="root"></div>

  <!--
    ── App Source Files ────────────────────────────────────────────────────
    Loaded in dependency order. Babel transpiles JSX in-browser (no build step).

    constants.js  →  AIRPLUG_TYPES, MASTER_TYPES, TARGET_DAYS, COMPANY_HOLIDAYS,
                     stage helpers, color helpers, chart hook, CSV parser
    utils.js      →  Date parsers (toIsoDateString, _resolveSlashDate),
                     fmtDate, fmtTs, workingDaysBetween, process-time helpers
    app.js        →  React App component, all page components, KPICard,
                     ErrorBoundary, ReactDOM.render mount
  -->
  <script type="text/babel" src="js/constants.js"></script>
  <script type="text/babel" src="js/utils.js"></script>
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
